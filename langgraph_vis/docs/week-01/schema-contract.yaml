openapi: 3.1.0
info:
  title: LangGraph Workflow Schema API Contract
  version: 1.0.0
description: |
  Week 1 전용 스키마 계약 v1.
  backend가 source-of-truth로 내려주는 workflow schema의 정규 JSON 구조, 필수 필드, 타입, 식별자 정책을 고정한다.
components:
  schemas:
    WorkflowSchemaResponse:
      type: object
      required:
        - schemaVersion
        - workflowId
        - version
        - nodes
        - edges
      properties:
        schemaVersion:
          type: string
          description: 계약 버전. 최소 "1.0.0"
        workflowId:
          type: string
          description: workflow 식별자. 네임스페이스 기준의 고유 값.
        version:
          type: string
          description: workflow 정의 버전. 최소 MAJOR.MINOR.PATCH 준수 권장.
        workflowName:
          type: string
          nullable: true
          description: 화면 라벨/표시명(선택).
        nodes:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/WorkflowNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowEdge"
    WorkflowNode:
      type: object
      required:
        - id
        - label
        - description
        - stateKey
        - order
      properties:
        id:
          type: string
          description: workflow 내 고유 nodeId. event key 매핑의 기준키.
        label:
          type: string
          description: UI 표시명.
        description:
          type: string
          description: 노드 동작 설명.
        stateKey:
          type: string
          description: state 조회/이벤트 매핑에 사용하는 키.
        metadata:
          type: object
          description: 파생 금지. backend 원천 데이터만 전달.
          additionalProperties: true
        order:
          type: integer
          minimum: 0
          description: UI 정렬 기준.
    WorkflowEdge:
      type: object
      required:
        - from
        - to
      properties:
        id:
          type: string
          description: edge 식별자(중복 불가).
        from:
          type: string
          description: source nodeId.
        to:
          type: string
          description: target nodeId.
        label:
          type: string
          nullable: true
          description: 조건/설명 라벨.
        metadata:
          type: object
          nullable: true
          description: 파생 금지.
    ErrorResponse:
      type: object
      required:
        - code
        - message
        - requestId
      properties:
        code:
          type: string
          description: 고정 에러 코드.
        message:
          type: string
          description: 사용자/운영자용 메시지.
        requestId:
          type: string
          description: 추적용 requestId.
    ErrorCodes:
      type: string
      enum:
        - WORKFLOW_NOT_FOUND
        - INVALID_WORKFLOW_ID
        - INVALID_WORKFLOW_PAYLOAD
        - WORKFLOW_REGISTRY_ERROR
        - INTERNAL_ERROR
  responses:
    WorkflowSchemaSuccess:
      description: 워크플로우 스키마 조회 성공.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WorkflowSchemaResponse"
    WorkflowSchemaNotFound:
      description: 조회한 workflow가 없을 때.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    WorkflowSchemaBadRequest:
      description: 요청 형식이 유효하지 않을 때.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    WorkflowSchemaServerError:
      description: 서버 내부 오류.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
paths:
  "/api/workflows/{id}/schema":
    get:
      summary: workflow schema 조회
      parameters:
        - in: path
          name: id
          required: true
          description: workflow 식별자. `^[a-z][a-z0-9_\\-]{1,63}$`
          schema:
            type: string
            pattern: "^[a-z][a-z0-9_\\-]{1,63}$"
            minLength: 2
            maxLength: 64
            example: support_ticket_classifier_v1
          example: support_ticket_classifier_v1
      responses:
        "200":
          $ref: "#/components/responses/WorkflowSchemaSuccess"
        "400":
          $ref: "#/components/responses/WorkflowSchemaBadRequest"
        "404":
          $ref: "#/components/responses/WorkflowSchemaNotFound"
        "500":
          $ref: "#/components/responses/WorkflowSchemaServerError"
identifiers:
  workflowId:
    pattern: "^[a-z][a-z0-9_\\-]{1,63}$"
    description: 소문자, 숫자, underscore/hyphen 허용; 2~64자, 시작문자 알파벳.
    rules:
      - workflowId는 글로벌하게 유일해야 함
      - registry에서 충돌 시 실패 처리
      - event key에서는 namespacePrefix = workflowId+"::"+nodeId로 사용
  nodeId:
    pattern: "^[a-z][a-z0-9_\\-]{1,63}$"
    description: workflow 내에서만 유일, 동일 workflow 내 중복 불가.
    rules:
      - nodeId는 workflow 내부에서 고유
      - stateKey와 1:1 대응을 기본 권장하되, nodeId와 별도 운영 가능
  stateKey:
    pattern: "^[a-z][a-zA-Z0-9_\\-]{0,127}$"
    description: state/store 조회 시 node별 상태값 키.
    rules:
      - 빈 문자열 금지
      - 동일 workflow에서 중복 불가를 권장
compatibility:
  schemaVersioning:
    majorMinor: "MAJOR.MINOR.PATCH"
    policy:
      - 필드 추가는 하위 호환
      - 필수 필드 삭제/타입 변경은 하위 비호환(승인 필요)
      - 기존 필드명 변경 금지
error-mapping:
  "400":
    - code: INVALID_WORKFLOW_ID
    - code: INVALID_WORKFLOW_PAYLOAD
  "404":
    - code: WORKFLOW_NOT_FOUND
  "500":
    - code: WORKFLOW_REGISTRY_ERROR
    - code: INTERNAL_ERROR
