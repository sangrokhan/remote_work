version: '3.9'
services:
  workflow-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "10001:8000"
    restart: unless-stopped

  chat-front:
    build:
      context: .
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        VITE_WORKFLOW_WS_URL: ws://192.168.1.5:10001/ws/connect
        VITE_WORKFLOW_GRAPH_URL: http://192.168.1.5:10001/graph
    ports:
      - "10000:10000"
    depends_on:
      - workflow-api
    restart: unless-stopped
