<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YANG Schema Viewer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Consolas', 'Courier New', monospace;
  background: #1e1e1e;
  color: #d4d4d4;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Top bar ── */
#topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: #252526;
  border-bottom: 1px solid #3c3c3c;
  flex-shrink: 0;
  position: relative;
}

#topbar-title {
  font-size: 14px;
  font-weight: 600;
  color: #cccccc;
  white-space: nowrap;
}

#search-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  max-width: 480px;
  position: relative;
}

#search-input {
  flex: 1;
  background: #3c3c3c;
  border: 1px solid #555;
  border-radius: 4px;
  color: #d4d4d4;
  font-family: inherit;
  font-size: 13px;
  padding: 5px 10px;
  outline: none;
}
#search-input:focus { border-color: #007acc; }
#search-input::placeholder { color: #888; }

#search-btn {
  background: #0e639c;
  border: none;
  border-radius: 4px;
  color: #fff;
  cursor: pointer;
  font-size: 12px;
  padding: 5px 12px;
  white-space: nowrap;
}
#search-btn:hover { background: #1177bb; }

#search-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: #252526;
  border: 1px solid #555;
  border-radius: 4px;
  max-height: 320px;
  overflow-y: auto;
  z-index: 100;
  box-shadow: 0 4px 12px rgba(0,0,0,.6);
}
#search-dropdown.open { display: block; }

/* ── Main layout ── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#tree-panel {
  width: 336px;
  min-width: 160px;
  max-width: 60vw;
  background: #252526;
  overflow-y: auto;
  flex-shrink: 0;
  padding: 6px 0;
}

#resizer {
  width: 4px;
  background: #3c3c3c;
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.15s;
}
#resizer:hover, #resizer.dragging { background: #007acc; }

#detail-panel {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  background: #1e1e1e;
}

/* ── Tree rows ── */
.tn-row {
  display: flex;
  align-items: center;
  cursor: pointer;
  padding: 3px 8px;
  gap: 4px;
  user-select: none;
  min-height: 24px;
}
.tn-row:hover { background: #2a2d2e; }
.tn-row.selected { background: #094771; }

.tn-toggle {
  width: 16px;
  flex-shrink: 0;
  text-align: center;
  font-size: 10px;
  color: #888;
}

.tn-name {
  font-size: 13px;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tn-badge {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  background: #3c3c3c;
  color: #aaa;
  flex-shrink: 0;
}

.tn-children { display: none; }
.tn-children.open { display: block; }

.tn-msg {
  font-size: 11px;
  color: #888;
  font-style: italic;
  padding: 4px 0;
}

/* ── Kind colors ── */
.k-module   { color: #9cdcfe; }
.k-container{ color: #4ec9b0; }
.k-list     { color: #ce9178; }
.k-leaf     { color: #9cdcfe; }
.k-leaf-list{ color: #dcdcaa; }
.k-choice   { color: #c586c0; }
.k-case     { color: #e06c75; }

/* ── Search result items ── */
.sr-item {
  display: flex;
  align-items: baseline;
  gap: 6px;
  padding: 6px 12px;
  cursor: pointer;
  border-bottom: 1px solid #3c3c3c;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: #2a2d2e; }

.sr-name {
  font-size: 13px;
  color: #9cdcfe;
  white-space: nowrap;
}

.sr-kind {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  background: #3c3c3c;
  color: #aaa;
}

.sr-path {
  font-size: 11px;
  color: #888;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}

/* ── Detail panel ── */
.detail-hint {
  color: #555;
  font-size: 13px;
  margin-top: 60px;
  text-align: center;
}

.detail-title {
  font-size: 16px;
  font-weight: 600;
  color: #9cdcfe;
  margin-bottom: 16px;
  border-bottom: 1px solid #3c3c3c;
  padding-bottom: 8px;
}

.df {
  display: flex;
  gap: 12px;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.5;
}

.df-label {
  color: #888;
  min-width: 110px;
  flex-shrink: 0;
}

.df-value {
  color: #d4d4d4;
  word-break: break-word;
}

.df-pre {
  background: #2d2d2d;
  border: 1px solid #3c3c3c;
  border-radius: 4px;
  color: #ce9178;
  font-family: inherit;
  font-size: 12px;
  padding: 6px 10px;
  white-space: pre-wrap;
  word-break: break-word;
  margin: 0;
}

.v-path     { color: #ce9178; }
.v-kind     { color: #4ec9b0; }
.v-true     { color: #4ec9b0; }
.v-false    { color: #f44747; }

/* ── Tabs ── */
.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: #888;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  padding: 4px 10px;
  white-space: nowrap;
}
.tab-btn:hover { color: #ccc; }
.tab-btn.active { border-bottom-color: #007acc; color: #fff; }

/* ── Builder panel ── */
#builder-panel {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
  background: #1e1e1e;
}
#builder-panel.active { display: flex; flex-direction: column; }

.bl-heading {
  font-size: 12px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}

.bl-label {
  color: #888;
  font-size: 12px;
  margin-bottom: 4px;
}

.bl-field { display: flex; flex-direction: column; gap: 4px; }

.bl-input {
  background: #3c3c3c;
  border: 1px solid #555;
  border-radius: 4px;
  color: #d4d4d4;
  font-family: inherit;
  font-size: 13px;
  padding: 5px 10px;
  outline: none;
  width: 360px;
  max-width: 100%;
}
.bl-input:focus { border-color: #007acc; }
.bl-input::placeholder { color: #888; }

.bl-select {
  background: #3c3c3c;
  border: 1px solid #555;
  border-radius: 4px;
  color: #d4d4d4;
  font-family: inherit;
  font-size: 13px;
  padding: 5px 10px;
  outline: none;
  cursor: pointer;
}
.bl-select:focus { border-color: #007acc; }

.bl-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }

.bl-btn {
  background: #0e639c;
  border: none;
  border-radius: 4px;
  color: #fff;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  padding: 5px 16px;
  white-space: nowrap;
  height: 30px;
}
.bl-btn:hover { background: #1177bb; }
.bl-btn.secondary { background: #3c3c3c; color: #ccc; }
.bl-btn.secondary:hover { background: #4a4a4a; }

.bl-selected-node {
  background: #2d2d2d;
  border: 1px solid #3c3c3c;
  border-radius: 4px;
  padding: 10px 14px;
  margin-bottom: 16px;
  max-width: 640px;
}
.bl-node-name { font-size: 15px; color: #9cdcfe; font-weight: 600; margin-bottom: 3px; }
.bl-node-path { font-size: 11px; color: #ce9178; }

.bl-divider { border: none; border-top: 1px solid #3c3c3c; margin: 20px 0; max-width: 640px; }

.bl-xml-wrap { position: relative; max-width: 720px; margin-top: 12px; }
.bl-xml-out {
  background: #2d2d2d;
  border: 1px solid #3c3c3c;
  border-radius: 4px;
  color: #ce9178;
  font-family: inherit;
  font-size: 12px;
  padding: 12px 40px 12px 14px;
  white-space: pre;
  overflow-x: auto;
  margin: 0;
  width: 100%;
}
.bl-copy-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  background: #3c3c3c;
  border: none;
  border-radius: 3px;
  color: #aaa;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  padding: 3px 8px;
}
.bl-copy-btn:hover { color: #fff; background: #4a4a4a; }

.bl-error { color: #f44747; font-size: 12px; margin-top: 6px; }

/* ── Chat panel ── */
#chat-panel {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
  background: #1e1e1e;
}
#chat-panel.active { display: flex; }

#chat-config {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: #252526;
  border-bottom: 1px solid #3c3c3c;
  flex-shrink: 0;
  flex-wrap: wrap;
}

#chat-config label { color: #888; font-size: 12px; white-space: nowrap; }

.chat-cfg-input {
  background: #3c3c3c;
  border: 1px solid #555;
  border-radius: 4px;
  color: #d4d4d4;
  font-family: inherit;
  font-size: 13px;
  padding: 4px 8px;
  outline: none;
}
.chat-cfg-input:focus { border-color: #007acc; }
#chat-llm-url { width: 260px; }
#chat-model { width: 120px; }

#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-msg {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end;
  background: #0e639c;
  color: #fff;
}
.chat-msg.assistant {
  align-self: flex-start;
  background: #2d2d2d;
  border: 1px solid #3c3c3c;
  color: #d4d4d4;
}
.chat-msg.thinking {
  align-self: flex-start;
  background: #2d2d2d;
  border: 1px solid #3c3c3c;
  color: #888;
  font-style: italic;
}
.chat-msg.error {
  align-self: flex-start;
  background: #3a1a1a;
  border: 1px solid #f44747;
  color: #f44747;
}

#chat-input-row {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  background: #252526;
  border-top: 1px solid #3c3c3c;
  flex-shrink: 0;
}

#chat-input {
  flex: 1;
  background: #3c3c3c;
  border: 1px solid #555;
  border-radius: 4px;
  color: #d4d4d4;
  font-family: inherit;
  font-size: 13px;
  padding: 7px 10px;
  outline: none;
  resize: none;
  height: 60px;
}
#chat-input:focus { border-color: #007acc; }
#chat-input::placeholder { color: #888; }

#chat-send-btn {
  background: #0e639c;
  border: none;
  border-radius: 4px;
  color: #fff;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  padding: 0 18px;
  white-space: nowrap;
}
#chat-send-btn:hover { background: #1177bb; }
#chat-send-btn:disabled { background: #3c3c3c; color: #666; cursor: default; }

#bl-search-wrap { position: relative; display: flex; gap: 6px; align-items: center; }
#bl-search-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  width: 360px;
  background: #252526;
  border: 1px solid #555;
  border-radius: 4px;
  max-height: 280px;
  overflow-y: auto;
  z-index: 100;
  box-shadow: 0 4px 12px rgba(0,0,0,.6);
}
#bl-search-dropdown.open { display: block; }
</style>
</head>
<body>

<div id="topbar">
  <span id="topbar-title">YANG Schema Viewer</span>
  <div style="display:flex;gap:2px;margin-right:4px;align-self:stretch;align-items:flex-end;">
    <button class="tab-btn active" data-tab="viewer">Tree Viewer</button>
    <button class="tab-btn" data-tab="builder">NETCONF Builder</button>
    <button class="tab-btn" data-tab="chat">AI Chat</button>
  </div>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Search nodes…" />
    <button id="search-btn">Search</button>
    <div id="search-dropdown"></div>
  </div>
</div>

<div id="main">
  <div id="tree-panel"></div>
  <div id="resizer"></div>
  <div id="detail-panel">
    <div class="detail-hint">Select a node in the tree to view details.</div>
  </div>
</div>

<div id="builder-panel">
  <div class="bl-heading">NETCONF edit-config Builder</div>

  <div style="margin-bottom:16px;">
    <div class="bl-label">Leaf name</div>
    <div id="bl-search-wrap">
      <input id="bl-search-input" class="bl-input" type="text" placeholder="e.g. mtu, description, enabled…" style="width:320px;" />
      <button id="bl-search-btn" class="bl-btn">Search</button>
      <div id="bl-search-dropdown"></div>
    </div>
  </div>

  <div id="bl-form" style="display:none;">
    <hr class="bl-divider">
    <div id="bl-selected-node-display" class="bl-selected-node"></div>
    <div id="bl-keys-section"></div>
    <div style="margin-bottom:12px;">
      <div class="bl-label">Value</div>
      <input id="bl-value-input" class="bl-input" type="text" placeholder="leaf value" />
    </div>
    <div class="bl-row" style="margin-bottom:16px;">
      <div class="bl-field">
        <div class="bl-label">Operation</div>
        <select id="bl-operation" class="bl-select">
          <option value="merge">merge</option>
          <option value="replace">replace</option>
          <option value="delete">delete</option>
        </select>
      </div>
      <div class="bl-field">
        <div class="bl-label">Datastore</div>
        <select id="bl-datastore" class="bl-select">
          <option value="running">running</option>
          <option value="candidate">candidate</option>
          <option value="startup">startup</option>
        </select>
      </div>
      <button id="bl-generate-btn" class="bl-btn">Generate</button>
      <button id="bl-reset-btn" class="bl-btn secondary">Reset</button>
    </div>
    <div id="bl-output"></div>
  </div>
</div>

<div id="chat-panel">
  <div id="chat-config">
    <label for="chat-llm-url">LLM server URL</label>
    <input id="chat-llm-url" class="chat-cfg-input" type="text" placeholder="http://192.168.1.100:11434" />
    <label for="chat-model">Model</label>
    <input id="chat-model" class="chat-cfg-input" type="text" placeholder="llama3" />
    <button id="chat-save-btn" class="bl-btn">Save</button>
  </div>
  <div id="chat-messages"></div>
  <div id="chat-input-row">
    <textarea id="chat-input" placeholder="Ask about YANG schema or NETCONF… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="chat-send-btn">Send</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ── Utilities ──────────────────────────────────────────────

  async function apiFetch(path) {
    const res = await fetch(path);
    if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + path);
    return res.json();
  }

  function kindClass(kind) {
    const map = {
      container: 'k-container',
      list: 'k-list',
      leaf: 'k-leaf',
      'leaf-list': 'k-leaf-list',
      choice: 'k-choice',
      case: 'k-case',
    };
    return map[kind] || 'k-leaf';
  }

  function isExpandable(node) {
    if (node.children_ids && node.children_ids.length > 0) return true;
    const expandableKinds = ['container', 'list', 'choice', 'case'];
    return expandableKinds.includes(node.node_kind);
  }

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text !== undefined && text !== null) e.textContent = text;
    return e;
  }

  function msgDiv(text, indent) {
    const d = el('div', 'tn-msg');
    d.style.paddingLeft = (indent || 0) + 'px';
    d.textContent = text;
    return d;
  }

  let _selectedRow = null;
  function selectRow(row) {
    if (_selectedRow) _selectedRow.classList.remove('selected');
    _selectedRow = row;
    if (row) row.classList.add('selected');
  }

  function buildRow(nameText, nameClass, badgeText, paddingLeft) {
    const row = el('div', 'tn-row');
    row.style.paddingLeft = (paddingLeft || 8) + 'px';

    const toggle = el('span', 'tn-toggle');
    toggle.textContent = '▶';

    const name = el('span', 'tn-name ' + (nameClass || ''));
    name.textContent = nameText;

    const badge = el('span', 'tn-badge');
    badge.textContent = badgeText || '';

    row.appendChild(toggle);
    row.appendChild(name);
    row.appendChild(badge);

    return { row, toggle };
  }

  // ── Tree: Module rows ──────────────────────────────────────

  function makeModuleRow(modName) {
    const wrapper = el('div');

    const { row, toggle } = buildRow(modName, 'k-module', 'module', 8);
    const children = el('div', 'tn-children');

    let expanded = false;
    let loaded = false;

    row.addEventListener('click', async function () {
      selectRow(row);
      expanded = !expanded;
      toggle.textContent = expanded ? '▼' : '▶';
      children.classList.toggle('open', expanded);

      if (expanded && !loaded) {
        loaded = true;
        children.replaceChildren(msgDiv('Loading…', 24));
        try {
          const data = await apiFetch('/tools/get_root_nodes?module=' + encodeURIComponent(modName));
          const nodes = data.nodes || [];
          children.replaceChildren();
          if (nodes.length === 0) {
            children.appendChild(msgDiv('(no nodes)', 24));
          } else {
            nodes.forEach(function (n) {
              children.appendChild(makeNodeRow(n, 1));
            });
          }
        } catch (err) {
          children.replaceChildren(msgDiv('Error: ' + err.message, 24));
        }
      }
    });

    wrapper.appendChild(row);
    wrapper.appendChild(children);
    return wrapper;
  }

  // ── Tree: Node rows ────────────────────────────────────────

  function makeNodeRow(node, depth) {
    const wrapper = el('div');
    const indent = 8 + depth * 16;

    const { row, toggle } = buildRow(node.name, kindClass(node.node_kind), node.node_kind, indent);
    const children = el('div', 'tn-children');

    const expandable = isExpandable(node);
    if (!expandable) toggle.style.visibility = 'hidden';

    let expanded = false;
    let loaded = false;

    row.addEventListener('click', async function (e) {
      e.stopPropagation();
      selectRow(row);
      showDetail(node.node_id);

      if (!expandable) return;

      expanded = !expanded;
      toggle.textContent = expanded ? '▼' : '▶';
      children.classList.toggle('open', expanded);

      if (expanded && !loaded) {
        loaded = true;
        children.replaceChildren(msgDiv('Loading…', indent + 16));
        try {
          const data = await apiFetch('/tools/get_children?node_id=' + encodeURIComponent(node.node_id));
          const kids = data.children || [];
          children.replaceChildren();
          if (kids.length === 0) {
            children.appendChild(msgDiv('(no children)', indent + 16));
          } else {
            kids.forEach(function (c) {
              children.appendChild(makeNodeRow(c, depth + 1));
            });
          }
        } catch (err) {
          children.replaceChildren(msgDiv('Error: ' + err.message, indent + 16));
        }
      }
    });

    wrapper.appendChild(row);
    wrapper.appendChild(children);
    return wrapper;
  }

  // ── Detail panel ───────────────────────────────────────────

  function renderField(label, value) {
    if (value === null || value === undefined) return null;
    if (value === '') return null;
    if (Array.isArray(value) && value.length === 0) return null;
    if (typeof value === 'object' && !Array.isArray(value) && Object.keys(value).length === 0) return null;

    const row = el('div', 'df');
    const lbl = el('span', 'df-label', label);
    row.appendChild(lbl);

    if (typeof value === 'object') {
      const pre = document.createElement('pre');
      pre.className = 'df-pre';
      pre.textContent = JSON.stringify(value, null, 2);
      row.appendChild(pre);
    } else {
      const val = el('span', 'df-value', String(value));
      row.appendChild(val);
    }
    return row;
  }

  function renderBoolField(label, value) {
    if (value === null || value === undefined) return null;
    const row = el('div', 'df');
    const lbl = el('span', 'df-label', label);
    const val = el('span', value ? 'df-value v-true' : 'df-value v-false', value ? 'true' : 'false');
    row.appendChild(lbl);
    row.appendChild(val);
    return row;
  }

  function renderTextField(label, value, cls) {
    if (!value) return null;
    const row = el('div', 'df');
    const lbl = el('span', 'df-label', label);
    const val = el('span', 'df-value' + (cls ? ' ' + cls : ''), String(value));
    row.appendChild(lbl);
    row.appendChild(val);
    return row;
  }

  async function showDetail(nodeId) {
    const panel = document.getElementById('detail-panel');
    panel.replaceChildren(msgDiv('Loading…', 0));
    try {
      const data = await apiFetch('/tools/get_node?node_id_or_path=' + encodeURIComponent(nodeId));
      const node = data.node;
      if (!node) {
        panel.replaceChildren(msgDiv('Node not found.', 0));
        return;
      }

      panel.replaceChildren();

      const title = el('div', 'detail-title', node.name);
      panel.appendChild(title);

      function appendField(f) { if (f) panel.appendChild(f); }

      appendField(renderTextField('schema_path', node.schema_path, 'v-path'));
      appendField(renderTextField('node_kind', node.node_kind, 'v-kind'));
      appendField(renderTextField('module', node.module));
      appendField(renderTextField('namespace', node.namespace));
      appendField(renderTextField('prefix', node.prefix));
      if (node.config !== null && node.config !== undefined) {
        appendField(renderBoolField('config', node.config));
      }
      appendField(renderField('keys', node.keys));
      appendField(renderField('type_info', node.type_info));
      if (node.mandatory !== null && node.mandatory !== undefined) {
        appendField(renderBoolField('mandatory', node.mandatory));
      }
      appendField(renderTextField('default', node.default));
      appendField(renderTextField('when_expr', node.when_expr));
      appendField(renderField('must_exprs', node.must_exprs));
      appendField(renderTextField('node_id', node.node_id));
      appendField(renderTextField('parent_id', node.parent_id));
      appendField(renderField('children_ids', node.children_ids));
      appendField(renderField('description', node.description));

    } catch (err) {
      panel.replaceChildren(msgDiv('Error: ' + err.message, 0));
    }
  }

  // ── Search ─────────────────────────────────────────────────

  async function doSearch() {
    const input = document.getElementById('search-input');
    const dropdown = document.getElementById('search-dropdown');
    const keyword = input.value.trim();
    if (!keyword) return;

    dropdown.replaceChildren(msgDiv('Searching…', 8));
    dropdown.classList.add('open');

    try {
      const data = await apiFetch('/tools/search_nodes?keyword=' + encodeURIComponent(keyword) + '&top_k=20');
      const nodes = data.nodes || [];
      dropdown.replaceChildren();

      if (nodes.length === 0) {
        dropdown.appendChild(msgDiv('No results.', 8));
        return;
      }

      nodes.forEach(function (n) {
        const item = el('div', 'sr-item');

        const name = el('span', 'sr-name', n.name);
        const kind = el('span', 'sr-kind', n.node_kind || '');
        const path = el('span', 'sr-path', n.schema_path || '');

        item.appendChild(name);
        item.appendChild(kind);
        item.appendChild(path);

        item.addEventListener('click', function () {
          dropdown.classList.remove('open');
          showDetail(n.node_id);
        });

        dropdown.appendChild(item);
      });
    } catch (err) {
      dropdown.replaceChildren(msgDiv('Error: ' + err.message, 8));
    }
  }

  // ── Bootstrap ──────────────────────────────────────────────

  // ── Resizable tree panel ───────────────────────────────────

  (function () {
    const resizer = document.getElementById('resizer');
    const treePanel = document.getElementById('tree-panel');
    let startX, startWidth;

    resizer.addEventListener('mousedown', function (e) {
      startX = e.clientX;
      startWidth = treePanel.getBoundingClientRect().width;
      resizer.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';

      function onMouseMove(e) {
        const delta = e.clientX - startX;
        const newWidth = Math.max(160, Math.min(window.innerWidth * 0.6, startWidth + delta));
        treePanel.style.width = newWidth + 'px';
      }

      function onMouseUp() {
        resizer.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
      }

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });
  })();

  // ── Tab switching ──────────────────────────────────────────

  (function () {
    const main = document.getElementById('main');
    const builderPanel = document.getElementById('builder-panel');
    const chatPanel = document.getElementById('chat-panel');
    const tabs = document.querySelectorAll('.tab-btn');

    tabs.forEach(function (btn) {
      btn.addEventListener('click', function () {
        tabs.forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        main.style.display = tab === 'viewer' ? 'flex' : 'none';
        builderPanel.classList.toggle('active', tab === 'builder');
        chatPanel.classList.toggle('active', tab === 'chat');
      });
    });
  })();

  // ── NETCONF Builder ────────────────────────────────────────

  (function () {
    let selectedNode = null;

    function blApiFetch(path) { return apiFetch(path); }

    async function blPostFetch(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }

    // Search
    async function blSearch() {
      const keyword = document.getElementById('bl-search-input').value.trim();
      if (!keyword) return;
      const dropdown = document.getElementById('bl-search-dropdown');
      dropdown.replaceChildren(msgDiv('Searching…', 8));
      dropdown.classList.add('open');

      try {
        const data = await blApiFetch('/tools/search_nodes?keyword=' + encodeURIComponent(keyword) + '&kind=leaf&top_k=20');
        const nodes = data.nodes || [];
        dropdown.replaceChildren();
        if (nodes.length === 0) {
          dropdown.appendChild(msgDiv('No leaf nodes found.', 8));
          return;
        }
        nodes.forEach(function (n) {
          const item = el('div', 'sr-item');
          item.appendChild(el('span', 'sr-name', n.name));
          item.appendChild(el('span', 'sr-kind', n.node_kind || ''));
          item.appendChild(el('span', 'sr-path', n.schema_path || ''));
          item.addEventListener('click', function () {
            dropdown.classList.remove('open');
            document.getElementById('bl-search-input').value = n.name;
            blSelectNode(n);
          });
          dropdown.appendChild(item);
        });
      } catch (err) {
        dropdown.replaceChildren(msgDiv('Error: ' + err.message, 8));
      }
    }

    // Select node → fetch required keys → show form
    async function blSelectNode(node) {
      selectedNode = node;
      const form = document.getElementById('bl-form');
      form.style.display = 'block';

      // Display selected node
      const display = document.getElementById('bl-selected-node-display');
      display.replaceChildren();
      const nameEl = el('div', 'bl-node-name', node.name);
      const pathEl = el('div', 'bl-node-path', node.schema_path || node.node_id);
      display.appendChild(nameEl);
      display.appendChild(pathEl);

      // Fetch required keys
      const keysSection = document.getElementById('bl-keys-section');
      keysSection.replaceChildren(msgDiv('Loading keys…', 0));
      try {
        const data = await blApiFetch('/tools/get_required_keys?node_id=' + encodeURIComponent(node.node_id));
        const keys = data.required_keys || [];
        keysSection.replaceChildren();
        keys.forEach(function (k) {
          const field = el('div', 'bl-field');
          field.style.marginBottom = '12px';
          const lbl = el('div', 'bl-label', 'Key: ' + k.key_name + ' (' + (k.type || 'string') + ')');
          const inp = el('input', 'bl-input');
          inp.type = 'text';
          inp.value = '?';
          inp.dataset.keyName = k.key_name;
          inp.placeholder = k.key_name;
          field.appendChild(lbl);
          field.appendChild(inp);
          keysSection.appendChild(field);
        });
      } catch (err) {
        keysSection.replaceChildren(msgDiv('Error loading keys: ' + err.message, 0));
      }

      document.getElementById('bl-output').replaceChildren();
    }

    // Generate
    async function blGenerate() {
      if (!selectedNode) return;
      const output = document.getElementById('bl-output');
      output.replaceChildren(msgDiv('Generating…', 0));

      const keyInputs = document.querySelectorAll('#bl-keys-section input[data-key-name]');
      const keyValues = {};
      keyInputs.forEach(function (inp) { keyValues[inp.dataset.keyName] = inp.value; });

      const value = document.getElementById('bl-value-input').value || null;
      const operation = document.getElementById('bl-operation').value;
      const datastore = document.getElementById('bl-datastore').value;

      try {
        const data = await blPostFetch('/tools/build_edit_config', {
          target_node_id: selectedNode.node_id,
          key_values: keyValues,
          value: value,
          operation: operation,
          datastore: datastore,
        });

        output.replaceChildren();
        if (data.error) {
          const errEl = el('div', 'bl-error', 'Error: ' + data.error);
          output.appendChild(errEl);
          return;
        }

        const wrap = el('div', 'bl-xml-wrap');
        const pre = el('pre', 'bl-xml-out', data.xml);
        const copyBtn = el('button', 'bl-copy-btn', 'Copy');
        copyBtn.addEventListener('click', function () {
          navigator.clipboard.writeText(data.xml).then(function () {
            copyBtn.textContent = 'Copied!';
            setTimeout(function () { copyBtn.textContent = 'Copy'; }, 1500);
          });
        });
        wrap.appendChild(pre);
        wrap.appendChild(copyBtn);
        output.appendChild(wrap);
      } catch (err) {
        output.replaceChildren(el('div', 'bl-error', 'Error: ' + err.message));
      }
    }

    // Reset
    function blReset() {
      selectedNode = null;
      document.getElementById('bl-search-input').value = '';
      document.getElementById('bl-form').style.display = 'none';
      document.getElementById('bl-output').replaceChildren();
      document.getElementById('bl-value-input').value = '';
      document.getElementById('bl-search-dropdown').classList.remove('open');
    }

    document.getElementById('bl-search-btn').addEventListener('click', blSearch);
    document.getElementById('bl-search-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') blSearch();
    });
    document.getElementById('bl-generate-btn').addEventListener('click', blGenerate);
    document.getElementById('bl-reset-btn').addEventListener('click', blReset);

    document.addEventListener('click', function (e) {
      const wrap = document.getElementById('bl-search-wrap');
      const dropdown = document.getElementById('bl-search-dropdown');
      if (!wrap.contains(e.target)) dropdown.classList.remove('open');
    });
  })();

  // ── AI Chat ────────────────────────────────────────────────

  (function () {
    const urlEl    = document.getElementById('chat-llm-url');
    const modelEl  = document.getElementById('chat-model');
    const saveBtn  = document.getElementById('chat-save-btn');
    const msgs     = document.getElementById('chat-messages');
    const inputEl  = document.getElementById('chat-input');
    const sendBtn  = document.getElementById('chat-send-btn');

    urlEl.value   = localStorage.getItem('chat_llm_url') || '';
    modelEl.value = localStorage.getItem('chat_model')   || 'llama3';

    saveBtn.addEventListener('click', function () {
      localStorage.setItem('chat_llm_url', urlEl.value.trim());
      localStorage.setItem('chat_model',   modelEl.value.trim());
      saveBtn.textContent = 'Saved!';
      setTimeout(function () { saveBtn.textContent = 'Save'; }, 1500);
    });

    function appendMsg(role, text) {
      const d = document.createElement('div');
      d.className = 'chat-msg ' + role;
      d.textContent = text;
      msgs.appendChild(d);
      msgs.scrollTop = msgs.scrollHeight;
      return d;
    }

    async function send() {
      const message  = inputEl.value.trim();
      const llm_url  = urlEl.value.trim();
      const model    = modelEl.value.trim() || 'llama3';
      if (!message)  { inputEl.focus(); return; }
      if (!llm_url)  { appendMsg('error', 'Set LLM server URL first.'); return; }

      inputEl.value = '';
      appendMsg('user', message);
      const thinking = appendMsg('thinking', 'Thinking…');
      sendBtn.disabled = true;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, llm_url, model }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'HTTP ' + res.status);
        thinking.className = 'chat-msg assistant';
        thinking.textContent = data.response || '(no response)';
      } catch (err) {
        thinking.className = 'chat-msg error';
        thinking.textContent = 'Error: ' + err.message;
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
  })();

  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('search-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') doSearch();
  });

  document.addEventListener('click', function (e) {
    const dropdown = document.getElementById('search-dropdown');
    const wrap = document.getElementById('search-wrap');
    if (!wrap.contains(e.target)) dropdown.classList.remove('open');
  });

  (async function bootstrap() {
    const treePanel = document.getElementById('tree-panel');
    treePanel.appendChild(msgDiv('Loading modules…', 8));
    try {
      const data = await apiFetch('/tools/list_modules');
      const modules = data.modules || [];
      treePanel.replaceChildren();
      if (modules.length === 0) {
        treePanel.appendChild(msgDiv('No modules found.', 8));
        return;
      }
      modules.forEach(function (mod) {
        treePanel.appendChild(makeModuleRow(mod));
      });
    } catch (err) {
      treePanel.replaceChildren(msgDiv('Error: ' + err.message, 8));
    }
  })();

})();
</script>
</body>
