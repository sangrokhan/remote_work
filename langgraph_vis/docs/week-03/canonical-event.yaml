id: week03-canonical-event
schemaVersion: "1.0.0"

title: Week 3 Canonical Event
type: object
required:
  - eventId
  - runId
  - threadId
  - eventSeq
  - eventType
  - issuedAt
  - checkpoint
  - canonicalMeta

properties:
  eventId:
    type: string
    description: 이벤트 유니크 ID
  runId:
    type: string
    description: 실행 단위 식별자
  threadId:
    type: string
    description: 스레드 식별자
  eventSeq:
    type: integer
    minimum: 1
    description: 순차 증가 시퀀스
  eventType:
    type: string
    description: canonical 이벤트 타입
    enum:
      - run_started
      - run_awaiting_input
      - run_completed
      - run_failed
      - run_cancelled
      - node_started
      - node_token
      - node_completed
      - node_failed
      - event_recovered
  nodeId:
    type: string
    description: 노드별 이벤트인 경우 노드 ID
  issuedAt:
    type: string
    format: date-time
    description: UTC ISO timestamp
  payload:
    type: object
    description: 원 이벤트 payload의 정규화 본문
  checkpoint:
    type: object
    description: 재연결 커서 상태
    properties:
      state:
        type: string
      eventSeq:
        type: integer
  canonicalMeta:
    type: object
    required:
      - isTerminal
      - source
      - replayable
      - schemaVersion
    properties:
      isTerminal:
        type: boolean
      source:
        type: string
        enum:
          - stream
          - orchestrator
          - replayer
      replayable:
        type: boolean
      schemaVersion:
        type: string
        example: "1.0.0"

additionalProperties: true
