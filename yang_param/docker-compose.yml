services:
  yang-viewer:
    build:
      context: .
      args:
        APT_MIRROR: http://deb.debian.org
        PIP_MIRROR: https://pypi.org/simple
    ports:
      - "12000:8000"
    volumes:
      - ./data/yang:/app/data/yang
      - yang-db:/app/data
    environment:
      YANG_DIR: /app/data/yang
      YANG_DB: /app/data/schema.db

volumes:
  yang-db:
