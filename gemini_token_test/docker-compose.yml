services:
  gemini-traffic:
    build:
      context: .
      # Mirror overrides (empty = upstream Docker Hub / PyPI / Debian).
      args:
        BASE_IMAGE: ${BASE_IMAGE:-python:3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        APT_MIRROR: ${APT_MIRROR:-}
    ports:
      - "8080:8080"
    # Needed for the optional packet-capture toggle (tcpdump raw sockets).
    # Remove if you don't use capture. Not applicable on Cloud Run.
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      # Vertex target
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - VERTEX_LOCATION=${VERTEX_LOCATION:-us-central1}
      # Local-only: mount a service-account key for ADC (Cloud Run uses metadata).
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      # Firestore history (uses same ADC). Set FIRESTORE_DISABLE=1 to skip.
      - FIRESTORE_COLLECTION=${FIRESTORE_COLLECTION:-gemini_runs}
      - FIRESTORE_DATABASE=${FIRESTORE_DATABASE:-(default)}
      # Set to 1 to run without GCP creds (synthetic data, no quota).
      - GEMINI_MOCK=${GEMINI_MOCK:-0}
      - GEMINI_PRICE_PER_TOKEN=${GEMINI_PRICE_PER_TOKEN:-0.0000001}
    volumes:
      - ./data:/app/data
      # Mount your local gcloud creds for non-mock local runs (optional):
      # - ~/.config/gcloud:/root/.config/gcloud:ro
