type: object
required:
  - eventId
  - runId
  - threadId
  - eventSeq
  - eventType
  - payload
  - checkpoint
  - issuedAt
properties:
  eventId:
    type: string
    minLength: 1
  runId:
    type: string
    minLength: 1
  threadId:
    type: string
    minLength: 1
  eventSeq:
    type: integer
    minimum: 1
  eventType:
    type: string
    minLength: 1
  payload:
    type: object
  checkpoint:
    type: object
    additionalProperties: true
  issuedAt:
    type: string
    format: date-time
  checksum:
    type: string
    description: optional payload checksum for transport integrity
