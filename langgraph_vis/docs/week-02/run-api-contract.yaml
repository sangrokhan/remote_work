openapi: "3.0.0"
info:
  title: Week 2 Run API Contract
  version: "1.0.0"
  description: Run state/query/sync API and SSE stream contract for week-02 implementation.
servers:
  - url: /api
paths:
  /runs/{runId}/state:
    get:
      summary: Get run cursor state
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 64
            pattern: "^[a-z][a-z0-9_-]{1,63}$"
      responses:
        "200":
          description: run state response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunStateResponse"
        "400":
          description: invalid runId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: INVALID_RUN_ID
                message: invalid run id: run-id
                requestId: "018..."
        "404":
          description: run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: RUN_NOT_FOUND
                message: requested run was not found
                requestId: "018..."
  /runs/{runId}/events:
    get:
      summary: List events with replay cursor
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 64
            pattern: "^[a-z][a-z0-9_-]{1,63}$"
        - in: query
          name: fromSeq
          required: false
          schema:
            type: integer
            minimum: 0
          description: Return events with eventSeq greater than this value.
        - in: query
          name: lastEventId
          required: false
          schema:
            type: string
          description: Return events after the resolved sequence of this eventId.
      responses:
        "200":
          description: event window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunEventsResponse"
        "400":
          description: invalid reconnect query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /runs/{runId}/events/stream:
    get:
      summary: SSE stream with replay cursor
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 64
            pattern: "^[a-z][a-z0-9_-]{1,63}$"
        - in: query
          name: fromSeq
          required: false
          schema:
            type: integer
            minimum: 0
        - in: query
          name: lastEventId
          required: false
          schema:
            type: string
      responses:
        "200":
          description: SSE event stream
          content:
            "text/event-stream":
              schema:
                type: string
                description: |
                  SSE line format:
                  - id: <event.eventId>
                  - event: run-event
                  - data: JSON-encoded RunEvent
        "400":
          description: invalid reconnect query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    Cursor:
      type: object
      required:
        - eventSeq
        - state
      properties:
        eventSeq:
          type: integer
          minimum: 1
        state:
          type: string
    Checkpoint:
      type: object
      required:
        - state
        - eventSeq
      additionalProperties: true
      properties:
        state:
          type: string
          minLength: 1
        eventSeq:
          type: integer
          minimum: 1
    RunStateResponse:
      type: object
      required:
        - runId
        - threadId
        - state
        - workflowId
        - workflowVersion
        - cursor
      properties:
        runId:
          type: string
          minLength: 1
        threadId:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
        workflowId:
          type: string
          minLength: 1
        workflowVersion:
          type: string
          minLength: 1
        cursor:
          $ref: "#/components/schemas/Cursor"
    RunEvent:
      type: object
      required:
        - eventId
        - runId
        - threadId
        - eventSeq
        - eventType
        - issuedAt
        - payload
        - checkpoint
      properties:
        eventId:
          type: string
          minLength: 1
        runId:
          type: string
          minLength: 1
        threadId:
          type: string
          minLength: 1
        eventSeq:
          type: integer
          minimum: 1
        eventType:
          type: string
          enum:
            - run_started
            - node_started
            - node_completed
            - event_recovered
            - run_completed
            - run_failed
            - run_cancelled
        issuedAt:
          type: string
          format: date-time
        payload:
          type: object
        checkpoint:
          $ref: "#/components/schemas/Checkpoint"
        checksum:
          type: string
    RunEventsResponse:
      type: object
      required:
        - runId
        - events
        - cursor
      properties:
        runId:
          type: string
          minLength: 1
        events:
          type: array
          items:
            $ref: "#/components/schemas/RunEvent"
        cursor:
          $ref: "#/components/schemas/Cursor"
    ErrorResponse:
      type: object
      required:
        - code
        - message
        - requestId
      properties:
        code:
          type: string
          enum:
            - RUN_NOT_FOUND
            - INVALID_RUN_ID
            - INVALID_RECONNECT_QUERY
            - INVALID_RUN_TRANSITION
            - INTERNAL_ERROR
        message:
          type: string
          minLength: 1
        requestId:
          type: string
          minLength: 1
        detail:
          type: string
          nullable: true
