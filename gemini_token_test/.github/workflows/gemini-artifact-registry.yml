# Build the gemini_token_test image and push it to GCP Artifact Registry.
#
# ACTIVATION: GitHub only runs workflows from the REPO ROOT `.github/workflows/`.
# This copy lives inside the project dir so it can be committed without the
# `workflow` OAuth scope. To activate, move it to the repo root:
#     mkdir -p .github/workflows
#     git mv gemini_token_test/.github/workflows/gemini-artifact-registry.yml \
#            .github/workflows/
# (pushing that move requires a token with the `workflow` scope).
#
# MANUAL ONLY: triggered via the Actions tab ("Run workflow"). Does NOT run on
# push/commit.
#
# Required GitHub repository config (Settings -> Secrets and variables -> Actions):
#   Secrets:
#     GCP_SA_KEY        Service-account JSON key (full file contents). The SA needs:
#                         roles/artifactregistry.writer  (push image)
#                         roles/run.developer            (deploy Cloud Run)
#                         roles/iam.serviceAccountUser   (act as the Cloud Run
#                                                         runtime service account)
#   Variables:
#     GCP_PROJECT_ID    e.g. my-project
#     GCP_REGION        e.g. us-central1   (Artifact Registry location)
#     AR_REPO           Artifact Registry repo name, e.g. gemini
#     AR_IMAGE          image name, e.g. gemini-traffic   (optional; defaults below)
#     CLOUD_RUN_SERVICE Cloud Run service name to deploy, e.g. gemini-traffic
#     CLOUD_RUN_REGION  Cloud Run region (optional; defaults to GCP_REGION)
#
# Cloud Run deploy preserves the previous revision's config: only the image is
# swapped. Env vars, VPC connector / egress settings, runtime service account,
# memory, concurrency, etc. are inherited from the running revision because no
# flag resets them. To change env later, use `--update-env-vars` (merge), NOT
# `--set-env-vars` (full overwrite).
#
# Create the AR repo once (if it does not exist):
#   gcloud artifacts repositories create gemini \
#     --repository-format=docker --location=us-central1

name: Gemini → Artifact Registry

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Extra image tag (besides the commit SHA and 'latest')"
        required: false
        default: ""

jobs:
  build-push:
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      REPO: ${{ vars.AR_REPO }}
      IMAGE: ${{ vars.AR_IMAGE != '' && vars.AR_IMAGE || 'gemini-traffic' }}
      SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      RUN_REGION: ${{ vars.CLOUD_RUN_REGION != '' && vars.CLOUD_RUN_REGION || vars.GCP_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Compute image path
        id: img
        run: |
          BASE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${IMAGE}"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          # Find the build context: works whether the checkout root is the
          # monorepo (Dockerfile under gemini_token_test/) or the project itself
          # (Dockerfile at the root).
          if [ -f gemini_token_test/Dockerfile ]; then CTX=gemini_token_test;
          elif [ -f Dockerfile ]; then CTX=.;
          else echo "Dockerfile not found"; ls -la; exit 1; fi
          echo "Build context: $CTX"
          docker build \
            -t "${{ steps.img.outputs.base }}:${{ steps.img.outputs.sha }}" \
            -t "${{ steps.img.outputs.base }}:latest" \
            "$CTX"

      - name: Tag extra (optional)
        if: ${{ github.event.inputs.image_tag != '' }}
        env:
          EXTRA_TAG: ${{ github.event.inputs.image_tag }}
          BASE: ${{ steps.img.outputs.base }}
          SHA: ${{ steps.img.outputs.sha }}
        run: docker tag "${BASE}:${SHA}" "${BASE}:${EXTRA_TAG}"

      - name: Push image
        run: docker push --all-tags "${{ steps.img.outputs.base }}"

      # Deploy the just-pushed SHA-tagged image to Cloud Run. Only --image is
      # given, so the previous revision's env vars, VPC/egress, runtime SA,
      # memory, concurrency, etc. are all inherited unchanged.
      - name: Deploy to Cloud Run
        env:
          IMG: ${{ steps.img.outputs.base }}:${{ steps.img.outputs.sha }}
        run: |
          if [ -z "${SERVICE}" ]; then
            echo "CLOUD_RUN_SERVICE variable is not set" >&2
            exit 1
          fi
          gcloud run deploy "${SERVICE}" \
            --image="${IMG}" \
            --region="${RUN_REGION}" \
            --project="${PROJECT_ID}" \
            --quiet

      - name: Summary
        run: |
          echo "Pushed:" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${{ steps.img.outputs.base }}:${{ steps.img.outputs.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${{ steps.img.outputs.base }}:latest" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Deployed to Cloud Run:" >> "$GITHUB_STEP_SUMMARY"
          echo "- service: ${SERVICE} (region: ${RUN_REGION})" >> "$GITHUB_STEP_SUMMARY"
          echo "- image:   ${{ steps.img.outputs.base }}:${{ steps.img.outputs.sha }}" >> "$GITHUB_STEP_SUMMARY"
